{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h2>Login to TruthLens</h2>
    <form method="POST" action="{{ url_for('login_page') }}" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
        <input type="text" name="username" placeholder="Username" required style="padding: 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: white;">
        <input type="password" name="password" placeholder="Password" required style="padding: 10px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: white;">
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Login</button>
    </form>
    <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="{{ url_for('register_page') }}" style="color: #00e676;">Register</a></p>
</div>
{% endblock %}
